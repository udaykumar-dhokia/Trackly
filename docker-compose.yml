services:
  db:
    image: postgres:15
    container_name: trackly-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: trackly
    ports:
      - "5432:5432"
    volumes:
      - trackly_data:/var/lib/postgresql/data

volumes:
  trackly_data:
